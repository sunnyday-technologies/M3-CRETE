# ============================================================================
# Homing Override — Sensorless (StallGuard) Sequence
# ============================================================================
# The sequence matters:
#   1. Z FIRST — drive all 4 Z posts UP into the top brace, each stalls
#      independently, giving per-corner coplanarity at Z=max.
#   2. X SECOND — home X to 0 (left Z-post frame is the hard stop).
#   3. Y LAST — home Y to 0 (front Z-posts frame is the hard stop).
#
# Why Z first: homing Z to the TOP means the gantry is already at a known
# safe height when X and Y home sideways into frame posts. If we homed X/Y
# first with Z at an unknown position, the printhead might hit an obstacle.
#
# StallGuard requires a short dwell between sequential homing moves on the
# same driver — the TMC needs time to clear its stall latch. We use G4 P200
# between moves (200ms) which is conservative but safe.
#
# The homing_override block REPLACES the default G28 handler. Calls to
# G28 will invoke this macro instead.
# ============================================================================

[homing_override]
axes: xyz
set_position_x: 0
set_position_y: 0
set_position_z: 0
gcode:
    # -------- clear any previous stall latches --------
    {% set SGTHRS_X = printer.configfile.settings['tmc5160 stepper_x'].driver_sgt %}
    {% set SGTHRS_Y = printer.configfile.settings['tmc5160 stepper_y'].driver_sgt %}

    # -------- determine which axes to home --------
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

    # ============================================================
    # Z FIRST — quad sensorless home to top brace
    # ============================================================
    {% if home_all or 'Z' in params %}
        M117 Homing Z (sensorless, quad-independent)
        # Pretend we're at Z=0 so the first move up is legal
        SET_KINEMATIC_POSITION Z=0
        # Move each Z driver independently using FORCE_MOVE so all 4 stall
        # against the top brace at their true individual max heights.
        # Klipper homing will drive them in parallel as a single virtual axis
        # — each stepper's stallguard fires independently on its own diag pin.
        G91
        G1 Z910 F600          ; drive up past nominal max — stall will halt it
        G90
        G4 P300               ; dwell for TMC to clear stall latch
        # After homing, all 4 Z posts are at physical Z=position_max
        SET_KINEMATIC_POSITION Z={printer.configfile.settings.stepper_z.position_max}
        # Back off 5mm so we're not resting against the brace
        G91
        G1 Z-5 F600
        G90
    {% endif %}

    # ============================================================
    # X — sensorless home to left frame
    # ============================================================
    {% if home_all or 'X' in params %}
        M117 Homing X (sensorless)
        G4 P300               ; dwell before next stall move
        G28 X0
        G4 P300
    {% endif %}

    # ============================================================
    # Y — sensorless home to front frame
    # ============================================================
    {% if home_all or 'Y' in params %}
        M117 Homing Y (sensorless)
        G4 P300
        G28 Y0
        G4 P300
    {% endif %}

    # ============================================================
    # Park position after homing — X/Y center, Z at safe height
    # ============================================================
    {% if home_all %}
        G90
        G1 X50 Y50 F3000
        G1 Z100 F600          ; drop to 100mm above bed for calibration
        M117 Homed — ready
    {% endif %}
