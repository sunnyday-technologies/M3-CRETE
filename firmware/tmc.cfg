# ============================================================================
# TMC5160 Driver Configuration — 7 motion drivers
# ============================================================================
# All 8 drivers on the Kraken share a single SPI bus. CS pin differentiates.
# SPI bus: spi4 on Kraken (PE11 SCK, PE13 MISO, PE12 MOSI — see board doc)
#
# run_current values:
#   - NEMA23 3Nm (23HS45-4204S1):  4.2A peak -> 3.0A RMS. Cap at 2.0A for
#     thermal headroom on Kraken's onboard drivers (no external heatsink).
#   - Start LOW (1.2A), verify motion, then step up in 0.2A increments.
#
# StallGuard (sensorless homing) tuning:
#   driver_SGT: -64 (most sensitive) to +63 (least sensitive).
#   Start at SGT=2, watch for false triggers, adjust:
#     - False triggers during normal motion  -> raise SGT (less sensitive)
#     - Stall not detected at hard stop      -> lower SGT (more sensitive)
#   Iterate until you get a reliable single stall at the frame.
#
# driver_TCOOLTHRS: 0xFFFFF enables StallGuard at all speeds (required for
# homing). Do NOT enable CoolStep (SEMIN > 0) — it interferes with StallGuard.
# ============================================================================

# ----------------------------------------------------------------------------
# X — sensorless homing into left Z-post frame
# ----------------------------------------------------------------------------
[tmc5160 stepper_x]
cs_pin: PE0
spi_bus: spi4
interpolate: True
run_current: 1.2             # START LOW — raise after first motion test
sense_resistor: 0.075
diag1_pin: ^PB14             # StallGuard output pin
driver_SGT: 2                # TUNE THIS — see header comment
driver_TPOWERDOWN: 10
driver_TBL: 2
driver_TOFF: 3

# ----------------------------------------------------------------------------
# Y — dual driver, sensorless homes BOTH together
# ----------------------------------------------------------------------------
[tmc5160 stepper_y]
cs_pin: PG15
spi_bus: spi4
interpolate: True
run_current: 1.2
sense_resistor: 0.075
diag1_pin: ^PB13
driver_SGT: 2
driver_TPOWERDOWN: 10
driver_TBL: 2
driver_TOFF: 3

[tmc5160 stepper_y1]
cs_pin: PG12
spi_bus: spi4
interpolate: True
run_current: 1.2
sense_resistor: 0.075
# y1 has no diag pin assigned — homing is synchronized via stepper_y's stall

# ----------------------------------------------------------------------------
# Z — quad independent drivers, each stall-detects its own top-brace contact
# ----------------------------------------------------------------------------
[tmc5160 stepper_z]
cs_pin: PG10
spi_bus: spi4
interpolate: True
run_current: 1.5             # Z carries more mass — slightly higher
sense_resistor: 0.075
diag1_pin: ^PG9
driver_SGT: 4                # Z is usually less sensitive than X/Y
driver_TPOWERDOWN: 10
driver_TBL: 2
driver_TOFF: 3

[tmc5160 stepper_z1]
cs_pin: PD1
spi_bus: spi4
interpolate: True
run_current: 1.5
sense_resistor: 0.075
diag1_pin: ^PD0
driver_SGT: 4
driver_TPOWERDOWN: 10
driver_TBL: 2
driver_TOFF: 3

[tmc5160 stepper_z2]
cs_pin: PC5
spi_bus: spi4
interpolate: True
run_current: 1.5
sense_resistor: 0.075
diag1_pin: ^PC4
driver_SGT: 4
driver_TPOWERDOWN: 10
driver_TBL: 2
driver_TOFF: 3

[tmc5160 stepper_z3]
cs_pin: PA4
spi_bus: spi4
interpolate: True
run_current: 1.5
sense_resistor: 0.075
diag1_pin: ^PA3
driver_SGT: 4
driver_TPOWERDOWN: 10
driver_TBL: 2
driver_TOFF: 3

# ----------------------------------------------------------------------------
# EXTRUDER (nozzle valve) — DRIVER7 onboard TMC5160
# ----------------------------------------------------------------------------
# The valve at the nozzle is a small, fast actuator with zero pressure
# advance. See steppers.cfg for the two-stage fluid architecture notes
# (valve in series with the upstream feed pump).
# ----------------------------------------------------------------------------
[tmc5160 extruder]
cs_pin: PF2
spi_bus: spi4
interpolate: True
run_current: 1.0             # small valve motor — start LOW
sense_resistor: 0.075
driver_TPOWERDOWN: 10
driver_TBL: 2
driver_TOFF: 3

# ----------------------------------------------------------------------------
# PUMP_FEED — external driver, NO TMC config needed
# ----------------------------------------------------------------------------
# The feed pump (NEMA34) runs on an external driver via Kraken's MOTOR7
# header pins (step/dir/enable only). External drivers don't use SPI and
# don't need a [tmc5160 ...] section — Klipper just sends step pulses.
# Set microsteps and run current via the external driver's DIP switches.
