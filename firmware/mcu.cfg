# ============================================================================
# MCU — BTT Kraken
# ============================================================================
# Board:   BTT Kraken v1.0 (STM32H723VGT6)
# USB ID:  /dev/serial/by-id/usb-Klipper_stm32h723xx_*
#
# Firmware build flags (make menuconfig):
#   Micro-controller:       STM32
#   Processor model:        STM32H723
#   Bootloader offset:      128KiB bootloader
#   Clock reference:        25 MHz crystal
#   Communication interface: USB (on PA11/PA12)
#
# Flashing:
#   1. SSH into the Pi
#   2. cd ~/klipper
#   3. make menuconfig (set flags above)
#   4. make
#   5. Copy klipper.bin to the Kraken's SD card as "firmware.bin"
#   6. Power cycle — Kraken will flash itself on boot
# ============================================================================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_XXXXXXXXXXXXXXXX-if00
# TODO(nick): replace the XXXXXX above after first flash — run
#   ls /dev/serial/by-id/
# on the Pi to find the real serial path.

# NOTE: the [mcu rpi] section for ADXL345 / input shaping lives in
# input_shaper.cfg (optional include, disabled by default in printer.cfg).
# Enable it only after wiring the ADXL345 and installing the host MCU.
