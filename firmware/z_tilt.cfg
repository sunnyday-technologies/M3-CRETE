# ============================================================================
# Z_TILT_ADJUST — Quad Z Self-Tramming
# ============================================================================
# With sensorless homing against the top brace, the 4 Z posts are already
# coplanar at Z=max on every G28. So why keep Z_TILT_ADJUST?
#
#   1. Belt stretch drift — over dozens of prints, GT2 belts creep. Running
#      Z_TILT_ADJUST monthly catches this before it becomes visible.
#   2. Power-loss recovery — if the machine loses power mid-print, belts can
#      shift a few teeth. Z_TILT_ADJUST re-squares everything without a full
#      top-brace slam (which is noisy and takes ~30s).
#   3. Debugging — if one corner is dragging, the per-stepper Z delta in the
#      Z_TILT_ADJUST log output tells you immediately which belt is slipping.
#
# How it works on M3-CRETE:
# ------------------------
# No physical probe exists (can't probe wet concrete). Instead we use
# StallGuard on each Z driver as a "virtual probe" by driving each corner
# up into the top brace, one at a time, and recording the position at stall.
# The 4 recorded values are then used to apply per-stepper offsets.
#
# Points below are the 4 corners of the Z platform, roughly aligned with
# each Z post (adjust slightly inward if your gantry can't quite reach the
# extreme corners).
# ============================================================================

[z_tilt]
z_positions:
    -60, -60                 # Z0  (front-left post centerline, relative to bed origin)
    1960, -60                # Z1  (front-right)
    -60, 960                 # Z2  (rear-left)
    1960, 960                # Z3  (rear-right)
points:
    100, 100                 # probe point near front-left
    1800, 100                # probe point near front-right
    100, 800                 # probe point near rear-left
    1800, 800                # probe point near rear-right
speed: 100                   # mm/s — horizontal travel between points
horizontal_move_z: 50        # mm — Z clearance when travelling between points
retries: 5                   # retry if the 4 corners are too mismatched
retry_tolerance: 0.25        # mm — acceptable spread across the 4 corners

# ----------------------------------------------------------------------------
# NOTE: Klipper's default [z_tilt] expects a physical probe. Without one,
# Z_TILT_ADJUST will fail until a [probe] section exists. For now, the
# recommended workflow is:
#
#   1. Run G28 (sensorless slam-to-top gives initial coplanarity, free)
#   2. Print test squares at the 4 corners and measure first-layer quality
#   3. Manually adjust Z offsets via: SET_GCODE_OFFSET Z_ADJUST=0.1 ...
#
# When you're ready to add a real probe (optical, touch plate, or
# load-cell mod on the extruder mount), uncomment the [probe] block below
# and Z_TILT_ADJUST will start working end-to-end.
# ----------------------------------------------------------------------------

# [probe]
# pin: ^PC2                   # TODO: pick an unused pin on the Kraken
# x_offset: 0
# y_offset: 25
# z_offset: 0
# speed: 5.0
# samples: 3
# samples_result: median
# sample_retract_dist: 3.0
# samples_tolerance: 0.01
# samples_tolerance_retries: 3
