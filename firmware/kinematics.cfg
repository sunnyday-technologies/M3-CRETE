# ============================================================================
# Kinematics — Cartesian (M3-2: 2000 x 1000 x 1000 mm)
# ============================================================================
# M3-CRETE is a Cartesian printer with:
#   - Single X motor driving a belt across the gantry
#   - Dual Y motors (one per Y rail) for anti-racking
#   - Quad independent Z motors (one per vertical post) for self-tramming
#
# Motion limits below are CONCRETE-appropriate:
#   - Concrete extruders (pumps) are heavy and produce massive reaction forces
#   - Sharp corners cause belt slip under mass — keep square_corner_velocity low
#   - Long belt runs (2m X span) mean extra stretch and ringing
#   - Start conservative, tune upward after input-shaping
# ============================================================================

[printer]
kinematics: cartesian
max_velocity: 100             # mm/s — start conservative, tune upward after input shaping
max_accel: 1500               # mm/s² — concrete mass demands gentle accel
max_z_velocity: 25            # mm/s — Z belts, not leadscrews
max_z_accel: 300              # mm/s²
square_corner_velocity: 5.0   # mm/s — low to prevent belt slip on corners
minimum_cruise_ratio: 0.5     # ensure meaningful cruise between accel/decel

# ----------------------------------------------------------------------------
# Build volume reference (do NOT edit — derived from frame geometry)
# ----------------------------------------------------------------------------
# Frame (outer):        2080 x 1080 x 1080 mm (2080 V-Slot profile outer-to-outer)
# Usable build volume:  ~1900 x 900 x 900 mm (after gantry + carriage + safety)
#
# Position limits are set per-axis in steppers.cfg (position_min / position_max)
# ============================================================================
