# ============================================================================
# Stepper Motors — Motion + Extruder
# ============================================================================
# Driver allocation on BTT Kraken (8 onboard TMC5160):
#   DRIVER0 -> stepper_x       (single X motor)
#   DRIVER1 -> stepper_y       (Y-left, primary)
#   DRIVER2 -> stepper_y1      (Y-right, secondary — dual drive, anti-racking)
#   DRIVER3 -> stepper_z       (Z front-left)
#   DRIVER4 -> stepper_z1      (Z front-right)
#   DRIVER5 -> stepper_z2      (Z rear-left)
#   DRIVER6 -> stepper_z3      (Z rear-right)
#   DRIVER7 -> extruder        (nozzle VALVE — small motor, ≤3A)
#
# The feed PUMP (NEMA34) runs on an EXTERNAL driver via Kraken's MOTOR7 header
# because NEMA34 needs 5–7A and TMC5160 tops out at ~3A RMS. See the extruder
# architecture notes further down.
#
# Belt / pulley math (same on every motion axis):
#   GT2 belt pitch:     2 mm
#   Pulley:             20 tooth
#   rotation_distance:  2 * 20 = 40 mm/rev
#   Full step:          200 steps/rev (1.8° motors)
#   Microsteps:         16 (with interpolation, see tmc.cfg)
#   Resolution:         40 / (200 * 16) = 0.0125 mm/microstep
#
# IMPORTANT — pin names below match BTT's official Kraken Klipper example config
# (example-kraken.cfg upstream). Verify against your board revision on first boot.
# ============================================================================

# ----------------------------------------------------------------------------
# X AXIS — belt-pinion drive (motor travels WITH the printhead)
# ----------------------------------------------------------------------------
# Architecture: the X motor is mounted on the X-carriage and its pulley
# rolls along a single fixed strand of 6mm GT2 belt that's anchored at
# both ends of the gantry beam. Rotating the pinion drives the carriage
# along the belt like a rack-and-pinion — there's no belt loop.
#
# Why belt-pinion on X:
#   - No 4m+ belt loop to stretch and resonate
#   - Simpler tensioning (two fixed anchors, no idler pulleys)
#   - Scales cleanly to longer X spans (M3-4 variant etc.)
#
# Consequences for this config:
#   - rotation_distance is UNCHANGED (40 = 20T * 2mm pitch, same math)
#   - Motor wires travel in the X drag chain alongside the printhead
#   - Direction polarity is often inverted from a loop-drive cartesian —
#     if X+ jogs the wrong way on first-motion test, toggle the '!' on
#     dir_pin below
#   - Moving mass includes the motor itself — keep accel conservative
#     until input shaping is tuned
# ----------------------------------------------------------------------------
[stepper_x]
step_pin: PE2
dir_pin: PE1                 # toggle '!' prefix if first-motion test moves wrong way
enable_pin: !PE4
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_endstop: 0
position_min: 0
position_max: 1900
homing_speed: 25             # sensorless — start conservative
homing_retract_dist: 0       # sensorless: MUST be 0 (no retract on stall)

# ----------------------------------------------------------------------------
# Y AXIS — dual motors at the REAR (anti-racking, loop-driven)
# ----------------------------------------------------------------------------
# Both Y motors are mounted at the REAR of the machine. The belts run from
# rear pulleys forward to idlers at the front and back. Home position (Y=0)
# is at the FRONT of the machine, so Y+ moves the gantry AWAY from home
# (toward the rear motors). If this is reversed on first-motion test,
# toggle the '!' on dir_pin below — BOTH Y motors must flip together.
# ----------------------------------------------------------------------------
[stepper_y]
step_pin: PF12
dir_pin: PF11
enable_pin: !PB7
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_endstop: 0
position_min: 0
position_max: 900
homing_speed: 25
homing_retract_dist: 0

[stepper_y1]
step_pin: PD7
dir_pin: PD6
enable_pin: !PF10
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
# y1 follows y — no endstop, homes together with the primary

# ----------------------------------------------------------------------------
# Z AXIS — four independent motors, belt-driven, sensorless homing to top
# ----------------------------------------------------------------------------
# Homing strategy: drive all 4 Z up until each stalls independently against
# the top brace. Each corner reaches mechanical stop at its true Z_max,
# giving 4-corner coplanarity without a physical probe. Z_TILT_ADJUST is
# still available as a recalibration tool — see z_tilt.cfg.
#
# Position values: Z=0 is the build surface, Z=900 is the top brace.
# position_endstop = position_max because we home UP.
# ----------------------------------------------------------------------------

[stepper_z]
step_pin: PD3
dir_pin: PD2
enable_pin: !PD5
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_z:virtual_endstop
position_endstop: 900
position_min: -2             # small negative allowance for Z offset calibration
position_max: 900
homing_speed: 10             # slow — belts under mass
homing_retract_dist: 0

[stepper_z1]
step_pin: PC9
dir_pin: PC8
enable_pin: !PD4
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200

[stepper_z2]
step_pin: PF9
dir_pin: PF8
enable_pin: !PF7
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200

[stepper_z3]
step_pin: PE6
dir_pin: PA14
enable_pin: !PE5
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200

# ============================================================================
# EXTRUDER SYSTEM — Two-stage fluid handling
# ============================================================================
# M3-CRETE does NOT use a single pushing pump like an FDM extruder. Instead,
# it uses TWO coordinated steppers in series:
#
#     G1 E... moves from the slicer
#                |
#                v
#     +------------------+       every E move drives both steppers in sync
#     |                  |
#     |   [extruder]     |  <-- NOZZLE VALVE
#     |   "valve"        |      - small motor (or servo), ≤3A
#     |                  |      - 1% retraction capability for clean stops
#     |                  |      - pressure_advance = 0 (valve is local, fast)
#     |                  |      - lives at the printhead
#     |                  |
#     +---------^--------+
#               |  sync
#               |
#     +---------v------------+
#     |                      |
#     |  [extruder_stepper   |  <-- FEED PUMP (the heavy NEMA34)
#     |   pump_feed]         |      - lives UPSTREAM of the hose
#     |                      |      - pressure_advance ~= 0.8 (tune)
#     |                      |        to pre-pressurize hose before
#     |                      |        valve commanded moves
#     |                      |      - rotation_distance can differ from
#     +----------------------+        the valve (different mech ratios OK)
#
# KEY INSIGHT: the valve is registered as [extruder] because the slicer
# thinks of E moves as nozzle output. The feed pump is an [extruder_stepper]
# synced to the valve. Per-stepper pressure_advance lets us have PA=0 on
# the valve AND PA~=0.8 on the feed pump simultaneously — the feed pump's
# PA offset runs its motion ahead in time so material is already arriving
# at the valve when the valve opens.
#
# Set PA at runtime via:
#   SET_PRESSURE_ADVANCE EXTRUDER=extruder   ADVANCE=0.0   # valve
#   SET_PRESSURE_ADVANCE EXTRUDER=pump_feed  ADVANCE=0.8   # feed pump
# Or use the SET_PUMP_PA macro in macros.cfg.
# ============================================================================

# ----------------------------------------------------------------------------
# EXTRUDER — Nozzle valve (on DRIVER7, onboard TMC5160)
# ----------------------------------------------------------------------------
[extruder]
step_pin: PE3
dir_pin: PA2
enable_pin: !PD15
microsteps: 16
full_steps_per_rotation: 200
# Valve geometry — calibrate per your nozzle valve mechanism.
# Small value: the valve moves a small volume per rev (it's a metering gate,
# not a material-pushing auger).
rotation_distance: 8.0       # PLACEHOLDER — calibrate per valve design
nozzle_diameter: 25.0        # mm — concrete nozzle bore (typical 20–40mm)
filament_diameter: 25.0      # match nozzle_diameter for volumetric flow
max_extrude_only_distance: 500.0
max_extrude_only_velocity: 50.0
max_extrude_only_accel: 500.0
# Zero pressure advance on the valve — it's a local, fast actuator
pressure_advance: 0.0
pressure_advance_smooth_time: 0.040
# Concrete is unheated — fake the thermistor so Klipper doesn't complain
heater_pin: PA1              # HE0 on Kraken — unused, keep disabled
sensor_type: Generic 3950    # placeholder
sensor_pin: PF4              # T0 on Kraken — placeholder
control: pid
pid_Kp: 22.0
pid_Ki: 1.0
pid_Kd: 100.0
min_temp: 0
max_temp: 300
min_extrude_temp: 0          # CRITICAL: 0 disables cold-extrude safety

# ----------------------------------------------------------------------------
# PUMP_FEED — Main material pump (NEMA34, external driver, upstream of hose)
# ----------------------------------------------------------------------------
# Synced to [extruder] so every G1 E... move drives both steppers. The feed
# pump's own pressure advance (set at runtime via SET_PRESSURE_ADVANCE) makes
# it run ahead of the valve in time, pressurizing the hose for the valve's
# commanded moves.
#
# rotation_distance can differ from the valve — each stepper converts E moves
# to its own physical displacement independently. If the feed pump dispenses
# more volume per rev than the valve outputs per E unit, the excess shows up
# as hose pressurization, which is exactly what you want.
#
# NOTE: no [tmc5160 ...] section for this stepper — it runs on an EXTERNAL
# driver connected to Kraken's MOTOR7 header (step/dir/enable only, no SPI).
# Set microsteps and run current via the external driver's DIP switches.
# ----------------------------------------------------------------------------

[extruder_stepper pump_feed]
extruder: extruder
step_pin: PE0                # MOTOR7 on Kraken (external driver signal)
dir_pin: PC13
enable_pin: !PC14
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 22.5      # PLACEHOLDER — calibrate per pump geometry
# To run the pump standalone (unsync from valve — e.g. for line priming):
#   SYNC_EXTRUDER_MOTION EXTRUDER=pump_feed MOTION_QUEUE=
# To resync to the valve (normal operation):
#   SYNC_EXTRUDER_MOTION EXTRUDER=pump_feed MOTION_QUEUE=extruder
