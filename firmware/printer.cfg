# ============================================================================
# M3-CRETE Klipper Configuration — Main Entry Point
# ============================================================================
# Printer:    M3-2 (2000 x 1000 x 1000 mm concrete 3D printer)
# Controller: BTT Kraken (STM32H723, 8x onboard TMC5160)
# Host:       Raspberry Pi 5 8GB
# Motion:     Cartesian, dual-Y, quad-independent-Z
# Homing:     Sensorless (StallGuard via TMC5160) — no physical endstops
# Firmware:   Mainline Klipper
# License:    CERN-OHL-W-2.0
# Repo:       github.com/sunnyday-technologies/M3-CRETE
# ----------------------------------------------------------------------------
# This file is the top-level entry. It pulls in the modular configs below.
# Edit individual files for specific subsystems — keep this file thin.
# ============================================================================

[include mcu.cfg]
[include kinematics.cfg]
[include steppers.cfg]
[include tmc.cfg]
[include homing.cfg]
[include z_tilt.cfg]
[include macros.cfg]
# [include input_shaper.cfg]   ; uncomment AFTER installing ADXL345 + host mcu

# ---- Mainsail / Fluidd / Moonraker integration ----
[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[display_status]
[pause_resume]
[respond]
[exclude_object]

# ---- Save variables / save config persistence ----
[save_variables]
filename: ~/printer_data/config/variables.cfg

# ---- Force move (required for homing_override) ----
[force_move]
enable_force_move: True
