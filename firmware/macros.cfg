# ============================================================================
# Macros — START_PRINT / END_PRINT / Pump Control
# ============================================================================
# Concrete printing is fundamentally different from FDM in a few ways that
# change how these macros look:
#   - No bed heating, no nozzle heating, no filament retraction
#   - "Purge" means priming the pump line with wet mix
#   - "End" means flushing the line with water before the mix sets
#   - Print failures are VERY expensive (drying concrete in the line)
#   - Two-stage fluid system: feed pump (PA>0) + nozzle valve (PA=0)
# ============================================================================

# ----------------------------------------------------------------------------
# START_PRINT — called at the top of every sliced gcode file
# ----------------------------------------------------------------------------
[gcode_macro START_PRINT]
gcode:
    M117 Homing axes
    G28
    M117 Levelling gantry
    # Z_TILT_ADJUST            ; uncomment once a probe is wired in
    M117 Setting pump pressure advance
    # Valve runs with zero PA — it's a local actuator
    SET_PRESSURE_ADVANCE EXTRUDER=extruder ADVANCE=0.0
    # Feed pump runs ahead of valve to pre-pressurize hose. Tune 0.3 to 1.5.
    SET_PUMP_PA ADVANCE=0.8
    M117 Priming pump
    # PUMP_PRIME               ; uncomment after first pump calibration
    M117 Printing...

# ----------------------------------------------------------------------------
# END_PRINT — called at the end of every sliced gcode file
# ----------------------------------------------------------------------------
[gcode_macro END_PRINT]
gcode:
    M117 Print complete — FLUSH LINE NOW
    G91
    G1 Z50 F600               ; lift Z 50mm
    G90
    G1 X50 Y50 F3000          ; park near origin
    # CRITICAL: the user must flush the pump line with water within 5 min
    # or concrete will cure inside it. PUMP_FLUSH macro below.
    M117 FLUSH LINE WITHIN 5 MIN

# ----------------------------------------------------------------------------
# CANCEL_PRINT — user-invoked panic stop
# ----------------------------------------------------------------------------
[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
    M117 CANCELLED — FLUSH LINE
    CANCEL_PRINT_BASE
    G91
    G1 Z50 F600
    G90
    G1 X50 Y50 F3000

# ----------------------------------------------------------------------------
# PUMP_PRIME — run the pump to fill the line with wet mix
# ----------------------------------------------------------------------------
# Runs both the valve and feed pump together (they're synced) so concrete
# flows through the entire line and out the nozzle.
# ----------------------------------------------------------------------------
[gcode_macro PUMP_PRIME]
gcode:
    {% set PRIME_LENGTH = params.LENGTH|default(100)|float %}
    {% set PRIME_SPEED = params.SPEED|default(10)|float %}
    M117 Priming pump {PRIME_LENGTH}mm at {PRIME_SPEED}mm/s
    G91
    M83                       ; relative extrusion
    G1 E{PRIME_LENGTH} F{PRIME_SPEED * 60}
    G90

# ----------------------------------------------------------------------------
# PUMP_FLUSH — run water through the line after print
# (Assumes you have a manual valve to switch pump intake from mix to water)
# ----------------------------------------------------------------------------
[gcode_macro PUMP_FLUSH]
gcode:
    {% set FLUSH_LENGTH = params.LENGTH|default(500)|float %}
    {% set FLUSH_SPEED = params.SPEED|default(20)|float %}
    M117 Flushing pump — switch intake to WATER
    G4 P5000                  ; 5 second pause for operator to switch valve
    G91
    M83
    G1 E{FLUSH_LENGTH} F{FLUSH_SPEED * 60}
    G90
    M117 Flush complete

# ----------------------------------------------------------------------------
# SET_PUMP_PA — set pressure advance on the feed pump independently
# ----------------------------------------------------------------------------
# The feed pump runs AHEAD of the nozzle valve by this many seconds worth
# of flow so the hose is pre-pressurized when the valve opens. Tune by
# printing a corner-test pattern and checking how much the nozzle output
# lags (needs MORE PA) or bulges (needs LESS PA) after direction changes.
#
# Typical range for concrete hoses:
#   0.3 — short stiff hose, thin mix
#   0.8 — default starting point
#   1.5 — long compliant hose, thick mix
#
# Note: this macro ONLY touches pump_feed, never extruder. The valve stays
# at PA=0 no matter what.
#
# Usage:
#   SET_PUMP_PA ADVANCE=0.8
#   SET_PUMP_PA ADVANCE=0.5 SMOOTH_TIME=0.06
# ----------------------------------------------------------------------------
[gcode_macro SET_PUMP_PA]
gcode:
    {% set ADV = params.ADVANCE|default(0.8)|float %}
    {% set SMOOTH = params.SMOOTH_TIME|default(0.040)|float %}
    SET_PRESSURE_ADVANCE EXTRUDER=pump_feed ADVANCE={ADV} SMOOTH_TIME={SMOOTH}
    M117 Pump PA: {ADV} (smooth {SMOOTH})

# ----------------------------------------------------------------------------
# PUMP_UNSYNC / PUMP_RESYNC — toggle feed pump independence
# ----------------------------------------------------------------------------
# Use PUMP_UNSYNC before manually jogging the pump (e.g. to fill the hopper
# without opening the valve). Use PUMP_RESYNC to return to normal coordinated
# operation.
# ----------------------------------------------------------------------------
[gcode_macro PUMP_UNSYNC]
gcode:
    SYNC_EXTRUDER_MOTION EXTRUDER=pump_feed MOTION_QUEUE=
    M117 Feed pump UNSYNCED — manual control

[gcode_macro PUMP_RESYNC]
gcode:
    SYNC_EXTRUDER_MOTION EXTRUDER=pump_feed MOTION_QUEUE=extruder
    M117 Feed pump RESYNCED to valve

# ----------------------------------------------------------------------------
# SHOW_SG — quick readout of StallGuard values for homing tuning
# ----------------------------------------------------------------------------
[gcode_macro SHOW_SG]
gcode:
    M117 StallGuard values (RESULT lower = closer to stall)
    DUMP_TMC STEPPER=stepper_x
    DUMP_TMC STEPPER=stepper_y
    DUMP_TMC STEPPER=stepper_y1
    DUMP_TMC STEPPER=stepper_z
    DUMP_TMC STEPPER=stepper_z1
    DUMP_TMC STEPPER=stepper_z2
    DUMP_TMC STEPPER=stepper_z3

