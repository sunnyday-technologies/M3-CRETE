# ============================================================================
# Input Shaping — ADXL345 resonance measurement + compensation
# ============================================================================
# Why this matters on M3-CRETE:
#   A 2m concrete printer has LONG belt spans that resonate at low frequencies
#   (typically 20–50 Hz on X, 30–60 Hz on Y). Without input shaping, corner
#   moves produce visible "ringing" — ghosted echoes of the corner that trail
#   for several cm. Input shaping cancels this by pre-biasing each move
#   against the axis's resonant frequency, so the vibration arrives at the
#   toolhead exactly out of phase with the commanded move.
#
# The ADXL345 mounts rigidly on the printhead (or X-carriage) and measures
# actual toolhead acceleration during a calibration sweep. Klipper's
# SHAPER_CALIBRATE macro drives the printer through the sweep, records the
# response, and recommends a shaper type (mzv, zv, ei, 2hump_ei, 3hump_ei)
# plus a frequency per axis.
#
# Because the ADXL345 wires to the Raspberry Pi GPIO (not the Kraken), it
# does not consume a motor driver slot. It also means Klipper needs a second
# MCU process running on the Pi host — see [mcu rpi] below.
#
# ---- IMPORTANT: this file is INCLUDED OPTIONALLY from printer.cfg ----
# Until the ADXL345 is physically wired up AND the host MCU process is
# running, the [include input_shaper.cfg] line in printer.cfg should stay
# COMMENTED. Enable it only after completing the setup steps below.
# ============================================================================

# ----------------------------------------------------------------------------
# Wiring (ADXL345 breakout -> Raspberry Pi 5 40-pin GPIO header)
# ----------------------------------------------------------------------------
#   ADXL345 pin    Pi header pin    Pi function
#   -----------    -------------    ------------
#   VCC            Pin  1           3.3V
#   GND            Pin  9           GND
#   CS             Pin 22           GPIO25
#   SDO (MISO)     Pin 21           GPIO9  / SPI0_MISO
#   SDA (MOSI)     Pin 19           GPIO10 / SPI0_MOSI
#   SCL (SCLK)     Pin 23           GPIO11 / SPI0_SCLK
#
# Mount the ADXL345 RIGIDLY to the printhead or X-carriage. Loose mounting
# (zip ties, double-sided tape) gives wildly wrong resonance data.
#
# ----------------------------------------------------------------------------
# Setup procedure (do this ONCE, then run SHAPER_CALIBRATE periodically)
# ----------------------------------------------------------------------------
# 1. Enable SPI on the Pi:
#      sudo raspi-config -> Interfacing Options -> SPI -> Enable
#
# 2. Install host dependencies:
#      sudo apt install python3-numpy python3-matplotlib libatlas-base-dev
#
# 3. Install Klipper's host MCU process:
#      cd ~/klipper && ./scripts/install-rpi-mcu.sh
#      (This creates the /tmp/klipper_host_mcu serial device Klipper uses
#       to talk to the Pi's GPIO.)
#
# 4. Add the pi user to required groups:
#      sudo usermod -a -G tty pi
#      sudo systemctl restart klipper_mcu
#
# 5. Uncomment the [include input_shaper.cfg] line in printer.cfg
#
# 6. FIRMWARE_RESTART in Mainsail
#
# 7. Run calibration:
#      TEST_RESONANCES AXIS=X
#      TEST_RESONANCES AXIS=Y
#      SHAPER_CALIBRATE
#
# 8. Klipper will print recommended values — paste them into the
#    [input_shaper] section below, then FIRMWARE_RESTART.
# ============================================================================

[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345]
cs_pin: rpi:gpio25
spi_speed: 5000000
spi_bus: spidev0.0

[resonance_tester]
accel_chip: adxl345
probe_points:
    950, 450, 50             # center of build plate, 50mm above surface
accel_per_hz: 50             # lower for large heavy printers
max_smoothing: 0.25          # conservative — prevents over-fitting

# ----------------------------------------------------------------------------
# [input_shaper] — REPLACE with actual SHAPER_CALIBRATE output
# ----------------------------------------------------------------------------
# The values below are educated guesses for a 2m concrete printer:
#   X axis is long + heavy -> expect low freq (~25–35 Hz)
#   Y axis is shorter + lighter -> expect higher freq (~40–55 Hz)
# Run SHAPER_CALIBRATE to get real numbers — don't trust these defaults.
# ----------------------------------------------------------------------------
[input_shaper]
shaper_freq_x: 30
shaper_type_x: mzv
shaper_freq_y: 45
shaper_type_y: mzv
