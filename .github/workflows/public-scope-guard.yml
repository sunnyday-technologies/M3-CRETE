name: Public scope guard

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-scope-guard:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run warning-only public-scope guard
        run: python scripts/check_public_scope_terms.py
